name: Build Kumir 2 (Windows EXE)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Compile C source code
      # ДОБАВЛЕН ФЛАГ -lws2_32 ДЛЯ ПОДДЕРЖКИ SOCKETS НА WINDOWS
      run: |
        gcc -O3 src/main.c src/lexer.c src/parser.c src/interpreter.c -lws2_32 -o kumir2.exe

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: kumir2-windows
        path: kumir2.exe
